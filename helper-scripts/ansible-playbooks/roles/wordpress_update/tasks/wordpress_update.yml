---
#
# This role backups/updates a wordpress site using WP_CLI
#

- fail: msg='Variable `only_backup` has to be specified when running the playbook. Please use option `-e {only_backup:True|False}` to run the playbook'
  when: only_backup is undefined

- name: setting only_backup to a boolean value
  set_fact:
    only_backup: "{{ only_backup | bool }}"

- name: set timestamp
  shell: date +%Y%m%d-%H%M
  register: timestamp

- name: set wordpress base dir
  shell: echo $(basename $(pwd))
  args:
    chdir: "{{ wordpress_path }}"
  register: wordpress_basename

- name: remove current management user
  user:
    name: "{{ management_user }}"
    state: absent
  become: yes

- name: create user group if it doesn't exist
  group:
    name: "{{ management_user }}"
    state: present
  become: yes

- name: add management user to perform the update
  user:
    name: "{{ management_user }}"
    state: present
    force: yes
    group: "{{ management_user }}"
  become: yes

- name: set management user wordpress home path
  shell: grep {{ management_user }} /etc/passwd | cut -d ":" -f6
  become: yes
  register: management_user_home

- name: set facts to be used later
  set_fact:
    timestamp: "{{ timestamp.stdout}}"
    wpcli_command: "{{ management_user_home.stdout }}/wp"
    management_user_home: "{{ management_user_home.stdout }}"
    wordpress_basename: "{{ wordpress_basename.stdout }}"
    wordpress_path_parent: "{{ wordpress_path }}/.."

- name: set facts to be used later
  set_fact:
    wordpress_backup_basename_db: "{{ wordpress_basename }}-backup-db"
    wordpress_backup_basename_site: "{{ wordpress_basename }}-backup-site"

- name: set facts to be used later
  set_fact:
    wordpress_backup_name_db: "{{ wordpress_backup_basename_db }}-{{ timestamp }}.sql"

- name: set facts to be used later
  set_fact:
    wordpress_backup_name_db_compressed: "{{ wordpress_backup_name_db }}.gz"
    wordpress_backup_name_site_compressed: "{{ wordpress_backup_basename_site }}-{{ timestamp }}.tar.gz"

- name: verify if WP-CLI is installed
  shell: ls {{ wpcli_command }}
  ignore_errors: yes
  register: wpcli_command_correct

- include_tasks: wpcli_install.yml
  when: wpcli_command_correct.rc > 0

- name: update wp-cli
  shell: sudo --user {{ management_user }} -- {{ wpcli_command }} cli update --yes
  register: update_wp_cli_result
  ignore_errors: yes

- debug: msg="ERROR UPDATING WP-CLI, PLEASE REVIEW"
  when: update_wp_cli_result.rc > 0

- name: change group for wordpress path to management user group
  shell: chgrp {{ management_user }} -R {{ wordpress_path }}
  become: yes

- name: add write permission to management user group for wordpress path
  shell: chmod g+w -R {{ wordpress_path }}
  become: yes

- name: taking backup of website
  include_tasks: backup_site.yml

