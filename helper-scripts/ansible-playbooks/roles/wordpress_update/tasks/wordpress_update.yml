#   args:
#     chdir: "{{ wordpress_path }}"
#   become: yes

- name: remove hardening script
  shell: rm {{ post_upgrade_hardening_script_name }}
  args:
    chdir: "{{ wordpress_path_parent }}"
  become: yes
