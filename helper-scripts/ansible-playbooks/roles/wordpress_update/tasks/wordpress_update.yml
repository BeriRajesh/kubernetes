- name: update wordpress plugins
  shell: sudo --user {{ management_user }} -- {{ wpcli_command }} plugin update --all
  args:
    chdir: "{{ wordpress_path }}"
  when: not only_backup

- name: update all wordpress themes
  shell: sudo --user {{ management_user }} -- {{ wpcli_command }} theme update --all
  args:
    chdir: "{{ wordpress_path }}"
  when: not only_backup

- name: update wordpress core
  shell: sudo --user {{ management_user }} --  {{ wpcli_command }} core update --minor
  args:
    chdir: "{{ wordpress_path }}"
  when: not only_backup

- name: remove management user
  user:
    name: "{{ management_user }}"
    state: absent
  become: yes

- name: remove management group
  group:
    name: "{{ management_user }}"
    state: absent
  become: yes

- name: template hardening script to <wordpress_path_parent>
  template:
    src: templates/{{ post_upgrade_hardening_script_name }}.j2
    dest: "{{ wordpress_path_parent }}/{{ post_upgrade_hardening_script_name }}"
    mode: ugo+x
  become: yes

- name: execute hardening script
  shell: "{{ wordpress_path_parent }}/{{ post_upgrade_hardening_script_name }}"
  ignore_errors: yes
  become: yes

# - name: remove site backups
