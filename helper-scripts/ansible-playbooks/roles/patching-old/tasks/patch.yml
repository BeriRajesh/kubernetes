---
- name: set timestamp
  shell: date +%Y%m%d-%H%M
  register: timestamp

- name: setting timestamp fact to be used later
  set_fact:
    timestamp: "{{ timestamp.stdout}}"

- name: gathering facts about root volume
  ec2_vol_facts:
    region: "{{ ec2_region }}"
    filters:
      attachment.instance-id: "{{ ec2_id }}"
      attachment.device: /dev/sda1
  register: volumes
  delegate_to: localhost

- name: setting volume_id variable
  set_fact:
    volume_id: "{{ volumes['volumes'][0]['id'] }}"

- name: setting facts to be used later
  set_fact:
    snapshot_name: PatchingSnapshot-{{ timestamp }}-VolumeId-{{ volume_id }}
    file_name_prepatch: patching-{{ patch_name_identifier }}-1-pre_-{{ timestamp }}-{{ ec2_tag_Environment | default("") }}-{{ ec2_tag_Application | default("") }}-{{ ec2_tag_Layer }}-{{ ec2_private_ip_address | default("") }}.txt
    file_name_postpatch: patching-{{ patch_name_identifier }}-2-post-{{ timestamp }}-{{ ec2_tag_Environment | default("") }}-{{ ec2_tag_Application | default("") }}-{{ ec2_tag_Layer }}-{{ ec2_private_ip_address | default("") }}.txt
    file_name_summary: patching-{{ patch_name_identifier }}-3-summ-{{ timestamp }}-{{ ec2_tag_Environment | default() }}-{{ ec2_tag_Application | default() }}-{{ ec2_tag_Layer }}-{{ ec2_private_ip_address | default() }}.txt
    file_name_diff: patching-{{ patch_name_identifier }}-4-diff-{{ timestamp }}-{{ ec2_tag_Environment | default() }}-{{ ec2_tag_Application | default() }}-{{ ec2_tag_Layer }}-{{ ec2_private_ip_address | default() }}.txt

- name: copy prepatch script to destination path
  copy:
    src: "files/{{ pre_script }}"
    dest: "{{ destination_path }}"
    mode: u+x
  become: yes
  register: copypre

- name: copy patch script to destination path
  copy:
    src: "files/{{ patch_script }}"
    dest: "{{ destination_path }}"
    mode: u+x
  become: yes
  register: copypatch

- name: copy post-patch script
  copy:
    src: "files/{{ post_script }}"
    dest: "{{ destination_path }}"
    mode: u+x
  become: yes
  register: copypost

- name: execute pre-script
  shell: "{{ destination_path }}/{{ pre_script }}"
  register: pre
  become: yes

- name: writing output of pre script to file
  template: src=templates/patching-pre.j2 dest=tmp/{{ file_name_prepatch }}
  delegate_to: localhost

- name: copy output of pre script to destination_path
  copy:
    src: "tmp/{{ file_name_prepatch }}"
    dest: "{{ destination_path }}"
    mode: u+r
  become: yes

