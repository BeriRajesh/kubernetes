- name: writing output of post script to file
  template: src=templates/patching-post.j2 dest=tmp/{{ file_name_postpatch }}
  delegate_to: localhost

- name: writing summary of patching to file
  template: src=templates/patching-summary.j2 dest=tmp/{{ file_name_summary }}
  delegate_to: localhost

- name: writing diff of pre/post patching scripts outputs to file
  shell: diff tmp/{{ file_name_prepatch }} tmp/{{ file_name_postpatch }} > tmp/{{ file_name_diff }} || true
  delegate_to: localhost

- name: copy output of post script to destination_path
  copy:
    src: "tmp/{{ file_name_postpatch }}"
    dest: "{{ destination_path }}"
    mode: u+r
  become: yes

- name: copy summary file to destination_path
  copy:
    src: "tmp/{{ file_name_summary }}"
    dest: "{{ destination_path }}"
    mode: u+r
  become: yes

- name: copy diff file to destination_path
  copy:
    src: "tmp/{{ file_name_diff }}"
    dest: "{{ destination_path }}"
    mode: u+r
  become: yes

- name: delete scripts
  file:
    path: "{{ destination_path }}/{{ item }}"
    state: absent
  become: yes
  with_items:
    - "{{ pre_script }}"
    - "{{ patch_script }}"
    - "{{ post_script }}"


