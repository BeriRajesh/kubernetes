---
- name: check if AUBI process is running
  shell: ps -ef | if grep -q "[l]abs_sso"; then echo yes; else echo no; fi
  register: aubi_running

- name: start aubi process if not running
  shell: nohup env NODEMODE=prod node staticsso.js &
  args:
    chdir: /data/work/prototypes_2017/labs
  when: aubi_running.stdout == "no"

- name: check if AUBI process is running
  shell: ps -ef | if grep -q "[l]abs_sso"; then echo yes; else echo no; fi
  register: aubi_running_2nd_check

- fail: msg="AUBI process not running"
  when: aubi_running_2nd_check.stdout == "no"
