---
- name: check java running
  include_role:
    name: java

- name: check if utility process is running
  shell: ps -ef | if grep -q "[w]orkerGroup.*dsdk"; then echo yes; else echo no; fi
  register: utility_running1

- name: start utility process if not running
  shell: nohup java -jar /opt/pipeline/TaskRunner-1.0.jar --workerGroup=wg-dsdk --region=us-east-1 --logUri=s3://annalect-datapipeline-logs/dsdk &
  when: utility_running1.stdout == "no"
#
#- name: start utility process if not running
#  shell: nohup java -jar /opt/pipeline/TaskRunner-1.0.jar --workerGroup=wg-comscore --region=us-east-1 --logUri=s3://annalect-datapipeline-logs/comscore & &
#  when: utility_running2.stdout == "no"

- name: check if utility process is running 2nd
  shell: ps -ef | if grep -q "[w]orkerGroup.*dsdk"; then echo yes; else echo no; fi
  register: utility_running_2nd_check

- fail: msg="wellsfargo process not running"
  when: utility_running_2nd_check.stdout == "no"
