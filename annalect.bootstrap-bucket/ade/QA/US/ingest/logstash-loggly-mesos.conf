input{
   file{
    path => ["/var/lib/mesos/slaves/*/frameworks/*/executors/*/runs/latest/stdout"] 
    type => "mesos-stdout"
    start_position => beginning
   }
  file{
    path => ["/var/lib/mesos/slaves/*/frameworks/*/executors/*/runs/latest/stderr"]
    type => "mesos-stderr"
    start_position => beginning
   }
}



output{
   if [type] == "mesos-stdout" {
      loggly{
        key => "e4e7c419-af0f-449a-a35c-4fcc4a13238d"
        tag => "ade-qa-mesos-stdout"
      }
    }
   if [type] == "mesos-stderr" {
      loggly{
        key => "e4e7c419-af0f-449a-a35c-4fcc4a13238d"
        tag => "ade-qa-mesos-stderr"
      }
    }
}
