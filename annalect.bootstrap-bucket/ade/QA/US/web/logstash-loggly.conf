input{
   file{
    path => ["/var/log/apache2/error.log"]
    type => "apache-error"
    start_position => end
   }
  file{
    path => ["/var/log/apache2/access.log"]
    type => "apache-access"
    start_position => end
   }
  file{
    path => ["/var/log/auth.log"]
    type => "auth"
    start_position => end
   }
}

filter{
   mutate{
      add_field => ["timestamp", "%{@timestamp}"]
   }
}

output{
   if [type] == "apache-error" {
      loggly{
        key => "e4e7c419-af0f-449a-a35c-4fcc4a13238d"
        host => "logs-01.loggly.com"
        tag => "ade-qa-apache-error"
        proto => "https"
      }
    }
   if [type] == "apache-access" {
      loggly{
        key => "e4e7c419-af0f-449a-a35c-4fcc4a13238d"
        host => "logs-01.loggly.com"
        tag => "ade-qa-apache-access"
        proto => "https"
      }
    }
   if [type] == "auth" {
      loggly{
        key => "e4e7c419-af0f-449a-a35c-4fcc4a13238d"
        host => "logs-01.loggly.com"
        tag => "ade-qa-auth-logs"
        proto => "https"
      }
    }
}
