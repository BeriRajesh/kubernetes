name: Automatic PR from QA to STG
on:
  push:
    branches:
      - qa
jobs:
  automatic_PR_from_QA_to_STG:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Create Pull Request
      uses: peter-evans/create-pull-request@v6
      with:
        base: stg
        commit-message: auto-update STG
        title: Update STG
        body: This PR was automatically generated by a merge into the qa branch
        branch: qa-promotion
