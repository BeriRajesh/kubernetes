name: Automatic PR from STG to PROD
on:
  push:
    branches:
      - stg
jobs:
  automatic_PR_from_STG_to_PROD:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Create Pull Request
      uses: peter-evans/create-pull-request@v6
      with:
        base: prod
        commit-message: auto-update PROD
        title: Update PROD
        body: This PR was automatically generated by a merge into the stg branch
        branch: stg-promotion
