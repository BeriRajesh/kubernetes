name: Run Flake8 linter on PR

on:
  pull_request:
    branches:
      - develop
      - qa
      - stg
      - prod
jobs:
  run-linter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
      - name: Install Flake8 linter
        run: |
          python -m pip install --upgrade pip
          python -m pip install flake8
      - name: Run Flake8 linter
        run: flake8 --ignore E203,E266,E501,W503,F403,F401 --max-complexity 18 --select B,C,E,F,W,T4,B9 --exclude venv/
