name: Automatic PR from DEV to QA
on:
  push:
    branches:
      - develop
jobs:
  automatic_PR_from_DEV_to_QA:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Create Pull Request
      uses: peter-evans/create-pull-request@v6.0.2
      with:
        base: qa
        commit-message: auto-update QA
        title: Update QA
        body: This PR was automatically generated by a merge into the develop branch
        branch: develop-promotion
